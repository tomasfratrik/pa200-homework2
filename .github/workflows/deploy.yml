name: Deploy Azure PaaS Todo App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  AZURE_STORAGE_CONTAINER: $web

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql

      - name: Check PHP syntax
        run: find . -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Upload static assets to Blob Storage
        run: |
          az storage blob upload-batch \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            --destination "${AZURE_STORAGE_CONTAINER}" \
            --source public \
            --pattern "*.css" \
            --overwrite true

      - name: Build App Service package
        run: |
          mkdir app-package
          cp index.php startup.sh nginx-default.conf app-package/
          mkdir app-package/public app-package/src
          cp public/index.php app-package/public/
          cp src/bootstrap.php app-package/src/

      - name: Deploy application to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: app-package
